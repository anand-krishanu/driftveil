spring.application.name=driftveil-spring
server.port=8080

# ── PostgreSQL ─────────────────────────────────────────────────────────────────
# Fill these in your environment or a .env file loaded by your IDE
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/driftveil}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA / Hibernate ───────────────────────────────────────────────────────────
# 'none' — Prisma owns the schema. Spring Boot only reads/writes, never alters.
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Preserve camelCase field names exactly (matches Prisma's column naming)
spring.jpa.properties.hibernate.physical_naming_strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# Quote all identifiers so PostgreSQL treats them as case-sensitive
spring.jpa.properties.hibernate.globally_quoted_identifiers=true

# ── CORS ──────────────────────────────────────────────────────────────────────
# Frontend dev server (Vite default)
cors.allowed-origins=http://localhost:5173

# ── Gemini AI ─────────────────────────────────────────────────────────────────
# Set GEMINI_API_KEY in your environment or a .env file loaded by your IDE.
# Matches the Python version: os.getenv("GEMINI_API_KEY", "")
# Leave empty to run in offline/demo fallback mode (no crashes).
gemini.api.key=${GEMINI_API_KEY:}
